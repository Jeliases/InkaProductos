spring.application.name=inka-productos
server.port=8081

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/erp_productos?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# Seguridad
jwt.secret=InkaProductosERP2024SecretKeyJWT!!

# Logs
logging.level.pe.cibertec=INFO
logging.level.org.springframework.security=WARN