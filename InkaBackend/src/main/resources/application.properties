spring.application.name=inka-productos
server.port=8081

# Base de datos MySQL
spring.datasource.url=jdbc:mysql://inka-mysql:3306/erp_productos?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seguridad
jwt.secret=InkaProductosERP2024SecretKeyJWT!!

# Logs
logging.level.pe.cibertec=INFO
logging.level.org.springframework.security=WARN

# --- CAMBIOS AGREGADOS PARA CORREGIR ACENTOS (UTF-8) ---
# Estas líneas fuerzan al servidor a enviar JSON siempre en UTF-8
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true


spring.jpa.properties.hibernate.default_catalog=erp_productos