services:
  inka-mysql:
    image: mysql:8.0
    container_name: inka-mysql
    networks:
      - inka-network
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: erp_productos
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  inka-postgres:
    image: postgres:latest
    container_name: inka-postgres
    networks:
      - inka-network
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: inka_bd_pg
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  inka-mongo:
    image: mongo:latest
    container_name: inka-mongo
    networks:
      - inka-network
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  inka-backend:
    image: inka-backend
    container_name: inka-backend
    networks:
      - inka-network
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://inka-mysql:3306/erp_productos?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      inka-mysql:
        condition: service_healthy

  inka-catalogo:
    image: inka-catalogo
    container_name: inka-catalogo
    networks:
      - inka-network
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://inka-mongo:27017/inka_catalogo
    depends_on:
      inka-mongo:
        condition: service_healthy

  inka-soporte:
    image: inka-soporte
    container_name: inka-soporte
    networks:
      - inka-network
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://inka-postgres:5432/inka_bd_pg
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      inka-postgres:
        condition: service_healthy

  inka-gateway:
    image: inka-gateway
    container_name: inka-gateway
    networks:
      - inka-network
    ports:
      - "8080:8080"
    depends_on:
      - inka-backend
      - inka-catalogo
      - inka-soporte

  inka-frontend:
    image: inka-frontend
    container_name: inka-frontend
    networks:
      - inka-network
    ports:
      - "4200:80"

networks:
  inka-network:
    driver: bridge