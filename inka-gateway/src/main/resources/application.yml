server:
  port: 8080

spring:
  application:
    name: inka-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        # 1. MongoDB (Catálogo rápido)
        - id: catalogo-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/catalogo/**

        # 2. PostgreSQL (Soporte Ti)
        - id: soporte-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/soporte/**

        # 3. MySQL (Monolito principal)
        - id: backend-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/**