server:
  port: 8080

spring:
  application:
    name: inka-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: catalogo-service
          uri: http://inka-catalogo:8082
          predicates:
            - Path=/api/catalogo/**
        - id: soporte-service
          uri: http://inka-soporte:8083
          predicates:
            - Path=/api/soporte/**
        - id: backend-service
          uri: http://inka-backend:8081
          predicates:
            - Path=/api/**