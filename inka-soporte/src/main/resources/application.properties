server.port=8083
spring.application.name=inka-soporte

# 1. Ajusta el usuario a 'postgres' (minúsculas) o el que creaste
spring.datasource.url=jdbc:postgresql://inka-postgres:5432/erp_soporte
spring.datasource.username=postgres
spring.datasource.password=ADMIN
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Agrega esta línea para evitar el error de Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 3. Mantenemos el auto-update
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true